2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="496.3613" font-family="sans-serif" font-size="14" textLength="582">后台通用服务： 当后台逻辑比较复杂或 http 通讯无法满足要求时，可以定义为后台通用服务。</text><circle cx="22.5" cy="509.5469" r="2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="513.9707" font-family="sans-serif" font-size="14" textLength="658">第三方应用程序： 第三方应用程序，可以通过自定义协议调用后台通用服务或通过http调用后台简单服务。</text><circle cx="22.5" cy="527.1563" r="2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="531.5801" font-family="sans-serif" font-size="14" textLength="660">用户程序： 用户编写的在机器人上运行的脚本程序，可以通过 CALL_SERVICE 的方式调用后台简单服务。</text><text x="17" y="549.1895" font-family="sans-serif" font-size="14" textLength="4"> </text></svg>