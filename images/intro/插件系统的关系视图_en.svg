</text><circle cx="22.5" cy="477.5775" r="2.5"/><text x="29" y="481.7757" font-family="sans-serif" font-size="14" textLength="1144.8965">Backend General Service: When backend logic is complex or http communication cannot meet requirements, it can be implemented as a backend general service.</text><circle cx="22.5" cy="493.8744" r="2.5"/><text x="29" y="498.0726" font-family="sans-serif" font-size="14" textLength="1027.3799">Third-party Applications: Third-party applications that can call backend general services via custom protocols or backend simple services via http.</text><circle cx="22.5" cy="510.1713" r="2.5"/><text x="29" y="514.3695" font-family="sans-serif" font-size="14" textLength="839.7949">User Program: User-written script programs running on robots that can call backend simple services via CALL_SERVICE.</text><text x="17" y="530.6664" font-family="sans-serif" font-size="14" textLength="4.4502"> </text></g></svg>