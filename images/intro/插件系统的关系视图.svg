" fill="none" d="M121.85,149.7394 C135.71,163.7894 161.79,187.3594 189.5,197.6094 C216.85,207.7294 291.49,202.5694 320.5,205.6094 C374.57,211.2694 387.54,216.9694 441.5,223.6094 C477.84,228.0794 489.56,217.8494 523.5,231.6094 C547.64,241.3894 566.0037,258.093 578.4037,271.123" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7"/><path fill="#181818" d="M582.54 275.4694 579.2332 266.1922 579.0931 271.8474 573.438 271.7073 582.54 275.4694z" style="stroke:#181818;stroke-width:1"/><text x="442.5" y="220.1045" font-family="sans-serif" font-size="13" textLength="22">http</text></g><rect id="_legend" width="682" height="115.6563" x="12" y="441.6094" fill="#ddd" rx="7.5" ry="7.5" style="stroke:#000;stroke-width:1"/><circle cx="22.5" cy="456.7188" r="2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="461.1426" font-family="sans-serif" font-size="14" textLength="466">Web小程序： 用户自己开发的GUI插件，可以通过 http 调用后台简单服务。</text><circle cx="22.5" cy="474.3281" r="2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="478.752" font-family="sans-serif" font-size="14" textLength="596">后台简单服务： 当后台逻辑比较简单时，并且 http 协议满足要求，则可以定义为后台简单服务。</text><circle cx="22.5" cy="491.9375" r="2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="496.3613" font-family="sans-serif" font-size="14" textLength="582">后台通用服务： 当后台逻辑比较复杂或 http 通讯无法满足要求时，可以定义为后台通用服务。</text><circle cx="22.5" cy="509.5469" r="2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="513.9707" font-family="sans-serif" font-size="14" textLength="658">第三方应用程序： 第三方应用程序，可以通过自定义协议调用后台通用服务或通过http调用后台简单服务。</text><circle cx="22.5" cy="527.1563" r="2.5" style="stroke:#000;stroke-width:0"/><text x="29" y="531.5801" font-family="sans-serif" font-size="14" textLength="660">用户程序： 用户编写的在机器人上运行的脚本程序，可以通过 CALL_SERVICE 的方式调用后台简单服务。</text><text x="17" y="549.1895" font-family="sans-serif" font-size="14" textLength="4"> </text></svg>